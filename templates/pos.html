<!DOCTYPE html>
<html>
<head>
    <title>Manual POS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pos.css') }}">
</head>
<body>

<div class="pos-container">

    <!-- Header -->
    <div class="pos-header">
        <h2>Manual POS</h2>
        <div>
            <p><strong>Invoice:</strong> {{ invoice_number }}</p>
            <p><strong>Date:</strong> {{ current_datetime }}</p>
        </div>
        <div class="header-buttons">
            <button onclick="goBack()" class="back-btn">🏠Back to Dashboard</button>
            <button onclick="printInvoice()" class="print-btn">🖨Print Invoice</button>
        </div>
    </div>

    <!-- Customer Info -->
    <div class="customer-section">
        <input type="text" id="customerName" placeholder="Customer Name (Optional)">
        <input type="text" id="customerPhone" placeholder="Phone Number (Optional)">
    </div>

    <!-- Items Table -->
    <table id="itemsTable">
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
                <th>Remove</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button onclick="addRow()" class="add-btn">+ Add Item</button>

    <!-- Summary -->
    <div class="summary-section">

        <div class="left-summary">
            <p>Subtotal: PKR <span id="subtotal">0.00</span></p>

            <label>GST %</label>
            <input type="number" id="gst" value="0" oninput="calculate()">

            <p>GST Amount: PKR <span id="gstAmount">0.00</span></p>

            <label>Discount</label>
            <input type="number" id="discount" value="0" oninput="calculate()">

            <h3>Grand Total: PKR <span id="grandTotal">0.00</span></h3>
        </div>

        <div class="right-summary">
            <label>Paid Amount</label>
            <input type="number" id="paidAmount" value="0" oninput="calculate()">

            <p>Change: PKR <span id="change">0.00</span></p>

            <label>Payment Method</label>
            <select id="paymentMethod">
                <option value="Cash">Cash</option>
                <option value="Card">Card</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select>

            <button onclick="saveSale()" class="complete-btn">Save✅</button>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/pos.js') }}"></script>
</body>
</html>
